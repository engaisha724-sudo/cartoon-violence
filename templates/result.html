<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartoon ViolenceDetection Result</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 50px;
            width: 500px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }
        .logo { margin-bottom: 15px; }
        .logo img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            border-radius: 10px;
        }
        h1 { color: #ffffff; font-size: 22px; margin-bottom: 30px; }
        .result-box {
            border-radius: 15px;
            padding: 40px 30px;
            margin-bottom: 30px;
        }
        .result-violent {
            background: rgba(233,69,96,0.15);
            border: 2px solid rgba(233,69,96,0.5);
        }
        .result-nonviolent {
            background: rgba(78,204,163,0.15);
            border: 2px solid rgba(78,204,163,0.5);
        }
        .result-icon { font-size: 70px; margin-bottom: 20px; }
        .result-label { font-size: 32px; font-weight: 700; }
        .result-violent .result-label { color: #ff6b8a; }
        .result-nonviolent .result-label { color: #4ecca3; }
        .filename {
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            margin-bottom: 30px;
        }
        .btn {
            background: linear-gradient(135deg, #e94560, #c23152);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(233,69,96,0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="{{ url_for('static', filename='logo.jpeg') }}" alt="Logo">
        </div>
        <h1>Detection Result</h1>

        {% if result == "Non-Violent" %}
        <div class="result-box result-nonviolent">
            <div class="result-icon"></div>
            <div class="result-label">Non-Violent</div>
        </div>
        {% else %}
        <div class="result-box result-violent">
            <div class="result-icon"></div>
            <div class="result-label">Violent</div>
        </div>
        {% endif %}

        <div class="filename"> {{ filename }}</div>
        <a href="/" class="btn"> Analyze Another Video</a>
    </div>
</body>
</html>
